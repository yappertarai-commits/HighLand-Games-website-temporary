<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HighLand Games — Releases</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #181f34;
            color: #f0f4ff;
            line-height: 1.7;
        }

        header {
            background: linear-gradient(135deg, #1f2937, #111827);
            padding: 18px 40px;
            border-bottom: 1px solid #375790;
        }

        .logo {
            font-size: 26px;
            font-weight: 700;
            color: #60a5fa;
        }

        .logo span {
            color: #93c5fd;
            font-weight: 300;
        }

        .hero {
            min-height: 35vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px 20px;
        }

        .hero h1 {
            font-size: 52px;
            color: #60a5fa;
        }

        .hero p {
            font-size: 20px;
            color: #d1d5db;
        }

        .section {
            max-width: 1100px;
            margin: auto;
            padding: 40px 20px;
        }

        .card {
            background: #1f2937;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #374151;
            margin-bottom: 20px;
        }

        .card h1 {
            color: #60a5fa;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .card a {
            color: #93c5fd;
            text-decoration: none;
            font-weight: bold;
        }

        .card a:hover {
            color: #60a5fa;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">HighLand <span>Games</span></div>
</header>

<section class="hero">
    <h1>РЕЛИЗЫ</h1>
    <p>и пре-релизы</p>
</section>

<section class="section">

    <section class="card">
        <h1>BETA-1 C++</h1>
        <p><a href="https://github.com/yappertarai-commits/Minecraft-clone/releases/tag/game">Смотреть</a></p>
    </section>

    <section class="card">
        <h1>BETA-2 C++</h1>
        <p><a href="https://github.com/yappertarai-commits/Minecraft-clone/releases/tag/gametree">Смотреть</a></p>
    </section>

    <section class="card">
        <h1>BETA-3 JAVA</h1>
        <p><a href="https://github.com/yappertarai-commits/Minecraft-clone/releases/tag/gametwo">Смотреть</a></p>
    </section>
    <section class="card">
        <h1>Назад</h1>
        <a class="btn" href="index.html">Вернуться</a>
    </section>

</body>
</html>
